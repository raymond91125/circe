id: https://wormbase.org/resources/connectome/schema
name: celegans-connectome
title: C. elegans Connectome Knowledge Graph Schema
description: >-
  LinkML schema (single source of truth) for the C. elegans connectome knowledge graph.
  Models cells (neurons/muscles grounded in WBBT anatomy), reified n-ary connections
  (chemical synapse, gap junction, functional), the datasets that observe them, and a
  first-class, additive provenance layer. RDF/OWL, JSON-Schema, and Python dataclasses are
  generated from this file.
license: MIT

prefixes:
  linkml: https://w3id.org/linkml/
  cckg: https://wormbase.org/resources/connectome/
  WBbt: http://purl.obolibrary.org/obo/WBbt_
  WB: https://www.wormbase.org/species/c_elegans/gene/
  xsd: http://www.w3.org/2001/XMLSchema#
  dcterms: http://purl.org/dc/terms/
default_prefix: cckg
default_range: string

imports:
  - linkml:types

# ---------------------------------------------------------------------------
# Classes
# ---------------------------------------------------------------------------
classes:

  Connectome:
    description: >-
      Top-level container holding all cells, connections, and datasets of one build.
      Serves as the tree root for data files and validation.
    tree_root: true
    attributes:
      cells:
        range: Cell
        multivalued: true
        inlined_as_list: true
      connections:
        range: Connection
        multivalued: true
        inlined_as_list: true
      datasets:
        range: Dataset
        multivalued: true
        inlined_as_list: true
      genes:
        range: Gene
        multivalued: true
        inlined_as_list: true
      gene_expressions:
        range: GeneExpression
        multivalued: true
        inlined_as_list: true

  Cell:
    description: >-
      A C. elegans cell (neuron or muscle, or other non-neuronal cell carried by
      neuron-graph), keyed by its neuron-graph name and grounded in a WBBT anatomy term.
      Carries the neuron-graph-native attributes so the viz JSON projection is lossless.
    slots:
      - id
      - name
      - cell_type
      - anatomy
      - cell_class
      - neurotransmitter
      - nemanode_type
      - embryonic
      - in_head
      - in_tail
      - sexes
      - unspecified
    slot_usage:
      id:
        description: The neuron-graph cell name, used as the stable key (e.g. "ADAL").

  Connection:
    description: >-
      A reified, n-ary connection between two cells observed in one dataset. Reified
      (not a plain triple) because it carries type, weight, dataset, and evidence.
    slots:
      - id
      - pre
      - post
      - connection_type
      - weight
      - dataset
      - evidence
    slot_usage:
      pre:
        required: true
      post:
        required: true
      connection_type:
        required: true

  Dataset:
    description: >-
      A specimen/dataset that observes connections (an EM reconstruction or functional-imaging
      dataset), from neuron-graph (White 1986, Witvliet 2020, Randi funconn) or Cook et al. 2019.
    slots:
      - id
      - name
      - description
      - strain
      - sex
      - life_stage

  Evidence:
    description: >-
      Provenance for a connection. Designed to be additive: v1 records an aggregated
      weight observed in a dataset; later releases can add individual synaptic-contact
      detail (section, volume, image) by adding optional slots, without schema churn.
    slots:
      - evidence_type
      - dataset
      - value
      - source

  Gene:
    description: >-
      A C. elegans gene, keyed by its persistent WormBase gene id (WB:WBGene…) as resolved via
      the Alliance of Genome Resources. Carries the gene symbol, WormBase systematic name, and a
      functional category. Genes are shared across gene-expression datasets.
    slots:
      - id
      - symbol
      - category
      - systematic_name
    slot_usage:
      id:
        description: The persistent WormBase gene id as a curie (e.g. "WB:WBGene00001517").

  GeneExpression:
    description: >-
      A reified assertion that a cell expresses a gene, compiled in one dataset. Reified (not a
      plain triple) because it carries the source dataset, evidence, an optional transcript-isoform
      qualifier (when the source resolves expression to an isoform), and a confidence mark.
    slots:
      - id
      - cell
      - gene
      - isoform
      - dataset
      - confidence
      - evidence
    slot_usage:
      cell:
        required: true
      gene:
        required: true

# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------
slots:
  id:
    identifier: true
    description: Stable identifier for the record.
  name:
    description: Human-readable label.
    slot_uri: dcterms:title
  cell_type:
    description: The broad kind of cell.
    range: CellType
  anatomy:
    description: The WBBT anatomy term this cell is grounded in.
    range: uriorcurie
    examples:
      - value: WBbt:0004013
        description: ADAL neuron
  cell_class:
    description: The neuron-graph cell class (e.g. "ADA" for ADAL/ADAR).
  neurotransmitter:
    description: neuron-graph neurotransmitter code (e.g. "l", "a", "g", "n").
  nemanode_type:
    description: >-
      Raw NemaNode cell-type code (e.g. "i", "s", "sm", "b"). Retained verbatim for the
      lossless viz projection; the curated CellType is in `cell_type`.
  embryonic:
    description: Whether the cell is born embryonically.
    range: boolean
  in_head:
    description: Whether the cell is in the head.
    range: boolean
  in_tail:
    description: Whether the cell is in the tail.
    range: boolean
  sexes:
    description: >-
      The sex(es) in which this cell is present, derived from the datasets that observe it.
      A shared cell has both; sex-specific cells have one — e.g. HSN/VC (hermaphrodite),
      the male ray neurons R1-R9, CEM, HOA/HOB, SPC, PCA/PCB/PCC, PDC (male). Class-level
      placeholder cells (``unspecified`` = true) carry no sexes: they stand in for
      unresolved individual cells, so asserting a sex-presence from dataset membership
      would be spurious (e.g. "VAn" appears only in a hermaphrodite dataset, but VA-class
      neurons are not hermaphrodite-specific).
    range: Sex
    multivalued: true
  unspecified:
    description: >-
      True when this cell is a class- or group-level placeholder minted for a connection
      endpoint that the source did not resolve to a specific individual cell — e.g. "VAn"
      (an unspecified VA-class motor neuron) or a pharyngeal muscle class such as "pm3".
      Such nodes are not individual cells and carry no sex-presence (empty ``sexes``), so
      per-cell analyses (sex-specificity, cell counts) can exclude them.
    range: boolean
  pre:
    description: The presynaptic / source cell.
    range: Cell
  post:
    description: The postsynaptic / target cell.
    range: Cell
  connection_type:
    description: The kind of connection.
    range: ConnectionType
  weight:
    description: Aggregated connection weight as reported by the observing dataset.
    range: float
  dataset:
    description: The dataset in which this was observed.
    range: Dataset
  evidence:
    description: Provenance records supporting this connection (open-world, additive).
    range: Evidence
    multivalued: true
    inlined_as_list: true
  description:
    description: Free-text description.
    slot_uri: dcterms:description
  strain:
    description: The C. elegans strain/genotype of the specimen, if known.
  sex:
    description: The biological sex of the specimen(s) the dataset observed.
    range: Sex
  life_stage:
    description: >-
      The developmental stage of the specimen(s) the dataset observed. Dauer is the
      stress-induced alternative third larval stage (a hermaphrodite), distinct from the
      continuous L1->L2->L3->L4->adult progression.
    range: LifeStage
  evidence_type:
    description: What kind of evidence this record represents.
    range: EvidenceType
  value:
    description: The evidence payload as text (e.g. the aggregated weight value).
  source:
    description: Pointer to the source data (file, URL, or upstream identifier).
    range: uriorcurie
  symbol:
    description: The gene's WormBase symbol (e.g. "gar-1").
    slot_uri: dcterms:title
  category:
    description: The functional category of the gene, as grouped by the source dataset.
    range: GeneCategory
  systematic_name:
    description: The WormBase systematic / sequence name (e.g. "C15B12.5").
  cell:
    description: The cell in which the gene is expressed.
    range: Cell
  gene:
    description: The expressed gene.
    range: Gene
  isoform:
    description: >-
      Transcript-isoform qualifier from the source (e.g. "a", "b") when it distinguishes isoforms;
      expression stays keyed to the persistent gene. Absent when the source is gene-level.
  confidence:
    description: The source's expression mark for this assertion.
    range: ExpressionConfidence

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------
enums:
  CellType:
    permissible_values:
      neuron:
        description: A neuron.
      muscle:
        description: A muscle cell.
      other:
        description: Another non-neuronal cell carried by neuron-graph.

  ConnectionType:
    permissible_values:
      chemical:
        description: Chemical synapse (EM).
      gap_junction:
        description: Electrical / gap-junction connection (EM).
      functional:
        description: Functional connectivity (FunCoNN).

  EvidenceType:
    permissible_values:
      aggregated_weight:
        description: An aggregated connection weight observed in a dataset (v1).
      synaptic_contact:
        description: An individual synaptic contact (reserved for a later release).

  Sex:
    description: The biological sex of a C. elegans specimen.
    permissible_values:
      hermaphrodite:
        description: XX self-fertilizing hermaphrodite.
      male:
        description: XO male.

  LifeStage:
    description: The developmental stage of a C. elegans specimen.
    permissible_values:
      embryo:
        description: Embryonic stage.
      L1:
        description: First larval stage.
      L2:
        description: Second larval stage.
      L2d:
        description: Pre-dauer (dauer-committed) second larval stage.
      dauer:
        description: Stress-induced alternative third larval stage (diapause).
      L3:
        description: Third larval stage.
      L4:
        description: Fourth larval stage.
      adult:
        description: Reproductive adult.

  GeneCategory:
    description: Functional category a gene is grouped under in an expression dataset.
    permissible_values:
      metabotropic_receptor:
        description: Metabotropic (G-protein-coupled) neurotransmitter receptor.
      ionotropic_receptor:
        description: Ionotropic (ligand-gated ion channel) neurotransmitter receptor.
      innexin:
        description: Innexin / gap-junction channel gene.
      neuropeptide:
        description: Neuropeptide-encoding gene.

  ExpressionConfidence:
    description: >-
      The source's expression mark. Cook 2020 SI6 uses uppercase "X" and lowercase "x"; the
      distinction is not defined in the source, so lowercase is taken as lower-confidence.
    permissible_values:
      reported:
        description: Expression reported (SI6 uppercase "X").
      putative:
        description: Weaker / putative expression (SI6 lowercase "x"); semantics unstated in source.

site_name: CIRCE Knowledge Graph Schema
site_description: >-
  LinkML schema (single source of truth) for the CIRCE C. elegans connectome
  knowledge graph — cells, reified connections, datasets, and provenance.
site_url: https://raymond91125.github.io/circe/
repo_url: https://github.com/raymond91125/circe
repo_name: raymond91125/circe

# Generated by scripts/gen-schema-docs.sh (LinkML docgen); also contains the
# downloadable connectome.owl.ttl and connectome.schema.json.
docs_dir: docs/schema

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.top
    - navigation.instant
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
